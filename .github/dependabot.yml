# Keeps the SHA-pinned actions and dev dependencies current.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # uv (not pip): the project's Python deps live in pyproject.toml/uv.lock,
  # and the pip ecosystem would also scan the requirements.txt files inside
  # evals/fixtures/, which are test data with deliberately planted issues.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
