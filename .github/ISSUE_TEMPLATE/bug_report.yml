name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, don't file here — see
        [SECURITY.md](https://github.com/IcebergAI/skilldeck/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, including the skill and agent involved.
      placeholder: |
        1. skilldeck install ... --agent ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: skilldeck version
      description: Output of `skilldeck --version` (or the commit / install method).
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you ran it (uvx / uv tool / pipx / clone).
    validations:
      required: false
