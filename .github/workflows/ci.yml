name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy
      - name: Release consistency (version matches CHANGELOG)
        run: python scripts/check_release_consistency.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --extra dev pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build wheel and sdist
        run: uv build
      - name: Verify skills are bundled in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          skills = [n for n in names if n.startswith("skilldeck/skills/")]
          assert any(n.endswith("meta.yaml") for n in skills), "no skill meta.yaml in wheel"
          assert any(n.endswith("skill.md") for n in skills), "no skill.md in wheel"
          print(f"ok: {len(skills)} skill files bundled")
          PY
